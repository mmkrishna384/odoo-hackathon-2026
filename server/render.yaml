services:
  - type: web
    name: transitops-backend
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 5001
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 30d
      - key: NODE_ENV
        value: production

  - type: static
    name: transitops-frontend
    plan: free
    rootDir: client
    buildCommand: npm install --legacy-peer-deps && npm run build
    publishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://transitops-backend-n4am.onrender.com/api
      - key: DISABLE_ESLINT_PLUGIN
        value: true
